<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inertial Navigation Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #startBtn { pointer-events: auto; padding: 15px 30px; font-size: 16px; font-weight: bold; background: #007aff; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #startBtn:active { background: #0056b3; }
        #data { margin-top: 20px; font-family: monospace; font-size: 14px; white-space: pre-wrap; line-height: 1.5; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <button id="startBtn">Start INS & Request Permission</button>
        <div id="data">Waiting for sensors...</div>
    </div>

    <script>
        // --- 1. Three.js Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grid helper for visual reference
        const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
        scene.add(gridHelper);

        // The "Phone" object
        const phoneGeometry = new THREE.BoxGeometry(1, 0.2, 2);
        const phoneMaterial = new THREE.MeshNormalMaterial();
        const phoneMesh = new THREE.Mesh(phoneGeometry, phoneMaterial);
        scene.add(phoneMesh);

        // The Path (Trail)
        const maxPathPoints = 500;
        const pathGeometry = new THREE.BufferGeometry();
        const pathPositions = new Float32Array(maxPathPoints * 3);
        pathGeometry.setAttribute('position', new THREE.BufferAttribute(pathPositions, 3));
        const pathMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
        const pathLine = new THREE.Line(pathGeometry, pathMaterial);
        scene.add(pathLine);

        let pathIndex = 0;

        // --- 2. Physics & INS Variables ---
        let position = new THREE.Vector3(0, 0, 0);
        let velocity = new THREE.Vector3(0, 0, 0);
        let lastTime = 0;

        // Noise thresholds (Crucial for mobile sensors)
        const ACCEL_DEADBAND = 0.3; // Ignore accelerations below this (m/s^2)
        const VELOCITY_DAMPING = 0.90; // Artificial friction to stop infinite drift

        const dataDisplay = document.getElementById('data');

        // --- 3. Sensor Integration Logic ---
        function handleMotion(event) {
            if (!lastTime) {
                lastTime = performance.now();
                return;
            }

            const now = performance.now();
            const dt = (now - lastTime) / 1000; // Delta time in seconds
            lastTime = now;

            // Get linear acceleration (hardware filters out gravity automatically here)
            // Note: iOS maps axes slightly differently depending on orientation, 
            // assuming portrait mode for this demo.
            let ax = event.acceleration.x || 0;
            let ay = event.acceleration.y || 0; 
            let az = event.acceleration.z || 0;

            // Apply deadband filter to eliminate sensor noise
            if (Math.abs(ax) < ACCEL_DEADBAND) ax = 0;
            if (Math.abs(ay) < ACCEL_DEADBAND) ay = 0;
            if (Math.abs(az) < ACCEL_DEADBAND) az = 0;

            // First Integration: Acceleration -> Velocity
            velocity.x += ax * dt;
            velocity.y += ay * dt;
            velocity.z += az * dt;

            // Apply dampening so it doesn't drift away forever
            velocity.multiplyScalar(VELOCITY_DAMPING);

            // Second Integration: Velocity -> Position
            // Scaling up position slightly so it's easier to see in the 3D world
            position.x += (velocity.x * dt) * 5; 
            position.y += (velocity.y * dt) * 5;
            position.z += (velocity.z * dt) * 5;

            // Update Phone Mesh Position
            phoneMesh.position.copy(position);

            // Update Trail
            if (pathIndex < maxPathPoints) {
                pathPositions[pathIndex * 3] = position.x;
                pathPositions[pathIndex * 3 + 1] = position.y;
                pathPositions[pathIndex * 3 + 2] = position.z;
                pathGeometry.attributes.position.needsUpdate = true;
                pathGeometry.setDrawRange(0, pathIndex + 1);
                pathIndex++;
            } else {
                // Shift array to make room for new points (rolling trail)
                for (let i = 0; i < maxPathPoints - 1; i++) {
                    pathPositions[i * 3] = pathPositions[(i + 1) * 3];
                    pathPositions[i * 3 + 1] = pathPositions[(i + 1) * 3 + 1];
                    pathPositions[i * 3 + 2] = pathPositions[(i + 1) * 3 + 2];
                }
                pathPositions[(maxPathPoints - 1) * 3] = position.x;
                pathPositions[(maxPathPoints - 1) * 3 + 1] = position.y;
                pathPositions[(maxPathPoints - 1) * 3 + 2] = position.z;
                pathGeometry.attributes.position.needsUpdate = true;
            }

            // Update UI
            dataDisplay.innerText = `
Accel (m/s²):
X: ${ax.toFixed(2)} | Y: ${ay.toFixed(2)} | Z: ${az.toFixed(2)}

Velocity:
X: ${velocity.x.toFixed(2)} | Y: ${velocity.y.toFixed(2)} | Z: ${velocity.z.toFixed(2)}

Position:
X: ${position.x.toFixed(2)} | Y: ${position.y.toFixed(2)} | Z: ${position.z.toFixed(2)}
            `.trim();
        }

        // --- 4. Gyroscope / Orientation Logic ---
        function handleOrientation(event) {
            // Apply device rotation to the 3D phone model
            if (event.alpha && event.beta && event.gamma) {
                const alpha = THREE.MathUtils.degToRad(event.alpha);
                const beta = THREE.MathUtils.degToRad(event.beta);
                const gamma = THREE.MathUtils.degToRad(event.gamma);
                
                // Euler order depends on the device, 'ZXY' is a common approximation for web APIs
                phoneMesh.rotation.set(beta, alpha, -gamma, 'ZXY'); 
            }
        }

        // --- 5. iOS 13+ Permissions & Start ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            // Request DeviceMotion
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                    } else {
                        alert('Motion permission denied.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            // Request DeviceOrientation
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            document.getElementById('startBtn').style.display = 'none';
        });

        // --- 6. Render Loop & Window Resize ---
        function animate() {
            requestAnimationFrame(animate);
            // Have the camera loosely follow the phone
            camera.position.x += (phoneMesh.position.x - camera.position.x) * 0.05;
            camera.position.y += (phoneMesh.position.y + 5 - camera.position.y) * 0.05;
            camera.position.z += (phoneMesh.position.z + 10 - camera.position.z) * 0.05;
            camera.lookAt(phoneMesh.position);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
